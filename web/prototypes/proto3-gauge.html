<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tideline · Proto 3 · Gauge</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #FAF3E0;
    --paper: #FFFFFF;
    --ink: #1A2429;
    --ink-muted: #6B7C82;
    --water-foam: #DCEEF0;
    --water-shallow: #88C8D0;
    --water-mid: #4A8B96;
    --water-deep: #1F3F4F;
    --sand-light: #F0DEB0;
    --sand: #DCC089;
    --line: rgba(26, 36, 41, 0.10);
}
* { font-family: 'Inter', sans-serif; box-sizing: border-box; }
.mono { font-family: 'JetBrains Mono', monospace; }
body { background: var(--bg); color: var(--ink); margin: 0; min-height: 100vh; }

.page {
    max-width: 1200px;
    margin: 60px auto;
    padding: 0 32px;
}

.layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 60px;
    align-items: center;
    background: var(--paper);
    border-radius: 24px;
    padding: 56px 48px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.06);
    border: 1px solid var(--line);
}
@media (max-width: 768px) { .layout { grid-template-columns: 1fr; } }

/* The gauge — vertical glass */
.gauge {
    position: relative;
    width: 220px;
    height: 480px;
    margin: 0 auto;
    border-radius: 110px;
    background: linear-gradient(180deg, var(--sand-light) 0%, var(--sand) 100%);
    border: 4px solid var(--ink);
    overflow: hidden;
    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.4),
        0 8px 24px rgba(31, 63, 79, 0.18);
}

/* Water inside, height = score */
.water {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: var(--tide-pct, 72%);
    background: linear-gradient(180deg, var(--water-shallow) 0%, var(--water-mid) 70%, var(--water-deep) 100%);
    transition: height 1.4s cubic-bezier(.4,.0,.2,1);
    overflow: hidden;
}
.water::before {
    content: '';
    position: absolute;
    top: -8px; left: -50%; right: -50%;
    height: 24px;
    background: var(--water-shallow);
    animation: ripple 4s ease-in-out infinite;
}
@keyframes ripple {
    0%, 100% { border-radius: 50% 60% 50% 60% / 100% 100% 0 0; transform: translateY(0); }
    50%      { border-radius: 60% 50% 60% 50% / 100% 100% 0 0; transform: translateY(-2px); }
}

/* Tick marks on the side of gauge */
.gauge-ticks {
    position: absolute;
    top: 24px; right: -88px; bottom: 24px;
    width: 80px;
    display: flex; flex-direction: column-reverse; justify-content: space-between;
    pointer-events: none;
}
.tick { font-size: 11px; color: var(--ink-muted); font-family: 'JetBrains Mono', monospace; position: relative; padding-left: 16px; }
.tick::before {
    content: ''; position: absolute; left: 0; top: 50%; width: 8px; height: 1px; background: var(--ink-muted); opacity: 0.5;
}
.tick.major { color: var(--ink); font-weight: 600; }
.tick.major::before { width: 14px; opacity: 1; height: 2px; }

/* Right side — readout */
.readout-side { padding-left: 12px; }
.readout-label {
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--ink-muted); margin-bottom: 6px;
}
.readout-num {
    font-size: clamp(120px, 16vw, 200px);
    font-weight: 700; letter-spacing: -0.04em; line-height: 0.9;
    color: var(--ink);
}
.readout-arrow {
    font-size: 32px; color: #2A8059; vertical-align: middle; margin-left: 8px;
}
.readout-headline {
    font-size: 22px; font-weight: 500; margin-top: 24px; max-width: 520px; line-height: 1.4;
}
.readout-meta {
    font-size: 13px; color: var(--ink-muted); margin-top: 8px;
}
.chips {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 28px;
}
.chip {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 14px; border-radius: 6px;
    font-size: 12px; font-weight: 600;
    background: var(--bg); color: var(--ink);
    border: 1px solid var(--line);
}
.chip .dot { width: 7px; height: 7px; border-radius: 50%; }
.brand {
    display: flex; align-items: center; gap: 10px; margin-bottom: 32px;
}
.brand-mark { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--water-shallow), var(--water-deep)); }
.brand-name { font-size: 18px; font-weight: 700; }
.proto-label {
    position: fixed; top: 20px; left: 20px; background: var(--ink); color: var(--bg);
    padding: 6px 12px; border-radius: 999px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
}
</style>
</head>
<body>
<div class="proto-label">Proto 3 · Gauge</div>
<a href="./index.html" style="position: fixed; top: 20px; right: 20px; color: var(--ink-muted); font-size: 12px; text-decoration: none;">← all 5</a>

<div class="page">
    <div class="brand">
        <div class="brand-mark"></div>
        <span class="brand-name">Tideline</span>
    </div>

    <div class="layout">
        <div style="position: relative; padding-right: 80px;">
            <div class="gauge" style="--tide-pct: 72%;">
                <div class="water"></div>
            </div>
            <div class="gauge-ticks">
                <div class="tick major">100 · high</div>
                <div class="tick">75</div>
                <div class="tick major">50 · neutral</div>
                <div class="tick">25</div>
                <div class="tick major">0 · low</div>
            </div>
        </div>

        <div class="readout-side">
            <div class="readout-label">Tide Score</div>
            <div>
                <span class="readout-num">72</span>
                <span class="readout-arrow">▲ rising</span>
            </div>
            <div class="readout-headline">The tide is rising. Risk-on conditions firming up across the board.</div>
            <div class="readout-meta">Data as of 2026-04-30 · Live · updated 2m ago</div>
            <div class="chips">
                <span class="chip"><span class="dot" style="background: #2A8059"></span> Trend · GREEN</span>
                <span class="chip"><span class="dot" style="background: #4A8B96"></span> Regime · NORMAL</span>
                <span class="chip"><span class="dot" style="background: #B89968"></span> 11 days in state</span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
