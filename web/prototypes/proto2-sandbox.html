<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tideline · Proto 2 · Sandbox</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #F5E6C8;
    --paper: #FAF3E0;
    --sand-dry: #F0DEB0;
    --sand-mid: #DCC089;
    --sand-wet: #A88254;
    --sand-shadow: #6F5634;
    --water: #5BA8B8;
    --water-deep: #2A5C6B;
    --ink: #2A2520;
    --ink-muted: #7C6E50;
    --wood: #8B6F47;
    --wood-light: #B8956A;
}
* { font-family: 'Inter', sans-serif; box-sizing: border-box; }
.mono { font-family: 'JetBrains Mono', monospace; }
body { background: var(--bg); color: var(--ink); margin: 0; min-height: 100vh; }

.scene-wrap {
    max-width: 1200px;
    margin: 40px auto;
    padding: 32px;
    background: var(--paper);
    border-radius: 28px;
    border: 2px solid rgba(43, 37, 32, 0.08);
    box-shadow: 0 24px 60px rgba(43, 37, 32, 0.10);
}

/* The sandbox — a wooden frame containing sand */
.sandbox {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    max-height: 480px;
    border-radius: 16px;
    background: var(--wood);
    padding: 20px;
    box-shadow: inset 0 4px 12px rgba(0,0,0,0.18);
}
.sandbox::before, .sandbox::after {
    content: ''; position: absolute; inset: 0; border-radius: 16px; pointer-events: none;
}
.sandbox::before {
    /* wood grain */
    background-image:
        repeating-linear-gradient(90deg, rgba(0,0,0,0.05) 0 1px, transparent 1px 12px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 36px);
}
.sandbox::after {
    /* wood corners */
    border: 8px solid var(--wood-light);
    border-radius: 16px;
    opacity: 0.4;
}

.sand-area {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--sand-dry) 0%, var(--sand-mid) 100%);
    overflow: hidden;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.10);
}

/* Wet area — radius depends on tide score; small score = small wet patch */
.wet-patch {
    position: absolute;
    bottom: -10%; left: 50%;
    transform: translateX(-50%);
    width: calc(60% + var(--tide-pct, 72) * 0.4%);  /* 60% at 0, 100% at 100 */
    height: calc(50% + var(--tide-pct, 72) * 0.5%);
    background: radial-gradient(ellipse at center bottom, var(--water) 0%, var(--water-deep) 40%, var(--sand-wet) 65%, transparent 80%);
    border-radius: 50% 50% 0 0;
    transition: width 1.4s, height 1.4s;
    opacity: 0.85;
}
.wet-patch::before {
    content: '';
    position: absolute;
    top: -8px; left: 0; right: 0; height: 16px;
    background: repeating-linear-gradient(90deg,
        transparent 0 4px, var(--water) 4px 6px, transparent 6px 10px);
    border-radius: 50%;
}

/* Sand grain texture overlay */
.sand-area::after {
    content: ''; position: absolute; inset: 0;
    background-image:
        radial-gradient(rgba(111, 86, 52, 0.20) 1px, transparent 1px),
        radial-gradient(rgba(255, 255, 255, 0.18) 1px, transparent 1.5px);
    background-size: 14px 14px, 9px 9px;
    background-position: 0 0, 4px 5px;
    pointer-events: none;
    mix-blend-mode: overlay;
}

/* Score in the middle of the sandbox */
.tide-readout {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 3;
}
.tide-label-top {
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--ink); opacity: 0.6;
}
.tide-num {
    font-size: clamp(140px, 18vw, 220px);
    font-weight: 800; letter-spacing: -0.04em; line-height: 0.9;
    color: var(--ink);
    text-shadow: 0 2px 0 rgba(255,255,255,0.6);
}
.tide-arrow {
    font-size: 36px;
    color: #1F6E48;
    margin-left: 8px;
    vertical-align: top;
    margin-top: 30px;
    display: inline-block;
}

/* Tools resting on the sandbox edge */
.tool {
    position: absolute;
    font-size: 36px;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.18));
}
.tool-shovel { top: -28px; right: 60px; transform: rotate(-25deg); }

/* Below-sandbox info */
.under-scene {
    margin-top: 28px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
}
.narrative {
    font-size: 22px; font-weight: 600; color: var(--ink); max-width: 640px;
}
.narrative-meta {
    font-size: 12px; color: var(--ink-muted); margin-top: 6px;
}
.badges {
    display: flex; gap: 8px; flex-wrap: wrap;
}
.badge {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 16px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
    background: var(--sand-dry); color: var(--ink);
    border: 1px solid var(--sand-mid);
}
.badge .dot { width: 7px; height: 7px; border-radius: 50%; }
.proto-label {
    position: fixed; top: 20px; left: 20px; background: var(--ink); color: var(--paper);
    padding: 6px 12px; border-radius: 999px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
}
</style>
</head>
<body>
<div class="proto-label">Proto 2 · Sandbox</div>
<a href="./index.html" style="position: fixed; top: 20px; right: 20px; color: var(--ink-muted); font-size: 12px; text-decoration: none;">← all 5</a>

<div class="scene-wrap">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <span style="font-size: 28px;">🪣</span>
            <h1 style="font-size: 24px; font-weight: 700; margin: 0;">Tideline</h1>
        </div>
        <span style="font-size: 12px; color: var(--ink-muted);">Live · updated 2m ago</span>
    </div>

    <div class="sandbox" style="--tide-pct: 72;">
        <div class="sand-area">
            <div class="wet-patch"></div>

            <div class="tool tool-shovel">🪏</div>

            <div class="tide-readout">
                <div class="tide-label-top">Tide Score</div>
                <div>
                    <span class="tide-num">72</span>
                    <span class="tide-arrow">▲</span>
                </div>
            </div>
        </div>
    </div>

    <div class="under-scene">
        <div>
            <div class="narrative">The tide is rising. Wet sand expanding — risk-on conditions firming up.</div>
            <div class="narrative-meta">Data as of 2026-04-30</div>
        </div>
        <div class="badges">
            <span class="badge"><span class="dot" style="background: #2A8059"></span> GREEN</span>
            <span class="badge"><span class="dot" style="background: #4A8B96"></span> NORMAL</span>
            <span class="badge"><span class="dot" style="background: var(--wood)"></span> 11 days</span>
        </div>
    </div>
</div>
</body>
</html>
