<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tideline · Proto 4 · Retro Coastal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
    --cream: #F5E9CB;
    --peach: #F5C99A;
    --coral: #E8856A;
    --sun: #F2A35E;
    --water-1: #5BB0BF;
    --water-2: #2F7387;
    --water-3: #143A4C;
    --sand-1: #E8C68C;
    --sand-2: #B5905C;
    --ink: #2D2014;
    --ink-muted: #7A6242;
}
* { font-family: 'Inter', sans-serif; box-sizing: border-box; }
.serif { font-family: 'DM Serif Display', serif; }
.mono { font-family: 'JetBrains Mono', monospace; }
body { background: var(--cream); color: var(--ink); margin: 0; min-height: 100vh; overflow-x: hidden; }

.poster {
    position: relative;
    max-width: 1200px;
    margin: 32px auto;
    padding: 56px 64px;
    background: var(--cream);
    border: 3px solid var(--ink);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 16px 16px 0 var(--coral);
}

/* Sun + horizon stack */
.horizon {
    position: relative;
    width: 100%; aspect-ratio: 16/8;
    border-radius: 4px;
    overflow: hidden;
    background:
        linear-gradient(180deg,
            var(--peach)  0%,    var(--peach)  20%,
            var(--sun)    20%,   var(--sun)    35%,
            var(--coral)  35%,   var(--coral)  45%,
            /* water bands */
            var(--water-1) 45%,  var(--water-1) 55%,
            var(--water-2) 55%,  var(--water-2) 70%,
            var(--water-3) 70%,  var(--water-3) 80%,
            /* sand bands */
            var(--sand-1) 80%,   var(--sand-1) 90%,
            var(--sand-2) 90%,   var(--sand-2) 100%);
    border: 2px solid var(--ink);
}
.sun-circle {
    position: absolute;
    top: 6%; left: 50%; transform: translateX(-50%);
    width: 110px; height: 110px;
    border-radius: 50%;
    background: var(--cream);
    border: 3px solid var(--ink);
}
.sun-rays {
    position: absolute;
    top: -2%; left: 50%; transform: translateX(-50%);
    width: 220px; height: 220px;
    border-radius: 50%;
    background:
        repeating-conic-gradient(from 0deg,
            var(--cream) 0deg 8deg,
            transparent 8deg 22deg);
    z-index: -1;
    opacity: 0.6;
}

/* Score slammed across the horizon */
.score-overlay {
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center;
    z-index: 5;
    color: var(--cream);
    text-shadow: 4px 4px 0 var(--ink), 8px 8px 0 rgba(232, 133, 106, 0.8);
}
.score-num {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(140px, 20vw, 260px);
    line-height: 0.85;
    letter-spacing: -0.02em;
    color: var(--cream);
}
.score-arrow {
    font-size: 56px; color: var(--cream);
    text-shadow: 4px 4px 0 var(--ink);
    margin-left: 12px;
    vertical-align: top; margin-top: 24px;
}
.score-label {
    font-size: 12px; letter-spacing: 0.4em; text-transform: uppercase;
    color: var(--cream); text-shadow: 2px 2px 0 var(--ink);
    margin-bottom: 6px;
}

/* Header — retro travel poster style */
.poster-header {
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 2px solid var(--ink); padding-bottom: 16px; margin-bottom: 24px;
}
.poster-title { font-family: 'DM Serif Display', serif; font-size: 40px; line-height: 1; }
.poster-meta { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-muted); }

/* Footer info */
.poster-foot {
    margin-top: 28px;
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
    padding-top: 24px; border-top: 2px solid var(--ink);
}
.tagline { font-family: 'DM Serif Display', serif; font-size: 28px; max-width: 540px; }
.tagline-meta { font-size: 12px; color: var(--ink-muted); margin-top: 4px; }
.stamps { display: flex; gap: 12px; flex-wrap: wrap; }
.stamp {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    border: 2px solid var(--ink); border-radius: 4px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--cream); color: var(--ink);
    transform: rotate(-1deg);
}
.stamp:nth-child(2) { transform: rotate(1.5deg); }
.stamp:nth-child(3) { transform: rotate(-0.5deg); }
.proto-label {
    position: fixed; top: 20px; left: 20px; background: var(--ink); color: var(--cream);
    padding: 6px 12px; border-radius: 999px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    z-index: 99;
}
</style>
</head>
<body>
<div class="proto-label">Proto 4 · Coastal Retro</div>
<a href="./index.html" style="position: fixed; top: 20px; right: 20px; color: var(--ink-muted); font-size: 12px; text-decoration: none; z-index: 99;">← all 5</a>

<div class="poster">
    <div class="poster-header">
        <h1 class="poster-title">TIDELINE</h1>
        <div class="poster-meta">Macro Regime Tracker · Est. 2026</div>
    </div>

    <div class="horizon">
        <div class="sun-rays"></div>
        <div class="sun-circle"></div>
        <div class="score-overlay">
            <div class="score-label">Tide Score</div>
            <div>
                <span class="score-num">72</span>
                <span class="score-arrow">▲</span>
            </div>
        </div>
    </div>

    <div class="poster-foot">
        <div>
            <div class="tagline">The tide is rising.</div>
            <div class="tagline-meta">Risk-on conditions across the board · Apr 30, 2026 · Live · 2m ago</div>
        </div>
        <div class="stamps">
            <span class="stamp">Trend · GREEN</span>
            <span class="stamp">Regime · NORMAL</span>
            <span class="stamp">11 days in state</span>
        </div>
    </div>
</div>
</body>
</html>
